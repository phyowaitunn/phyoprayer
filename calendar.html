<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Islamic Calendar</title>

<link rel="stylesheet" href="css/calendar.css">

</head>

<body>

<header class="header">

<a href="home.html" class="back">←</a>
<h1>Islamic Calendar</h1>

</header>


<div class="calendar-card">

<!-- TODAY -->

<div class="today-box">

<p id="gregorianDate"></p>

<h2 id="hijriDate"></h2>

<p id="islamicEvent"></p>

</div>


<!-- MONTH NAV -->

<div class="month-nav">

<button onclick="prevMonth()">‹</button>

<h3 id="monthTitle"></h3>

<button onclick="nextMonth()">›</button>

</div>


<!-- WEEK -->

<div class="week">

<span>Sun</span>
<span>Mon</span>
<span>Tue</span>
<span>Wed</span>
<span>Thu</span>
<span>Fri</span>
<span>Sat</span>

</div>


<!-- DAYS -->

<div class="days" id="calendarDays"></div>

</div>


<script src="js/calendar.js"></script>

</body>
</html>
