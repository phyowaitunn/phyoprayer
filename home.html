<!DOCTYPE html>
<html>
<head>

<div class="header">
<h2 id="greeting">Assalamu Alaikum</h2>

<div class="box"><p>Maghrib</p><h3 id="maghrib"></h3></div>
<div class="box"><p>Isha</p><h3 id="isha"></h3></div>

</div>
