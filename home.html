<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="css/home.css">
<title>Phyo Prayer</title>
</head>

<body>
<!-- header-premium -->
<div class="premium-header">
<h1 class="app-name">Phyo Prayer</h1>
<p id="greeting" class="greeting"></p>
<p id="todayDate" class="date"></p>

<!-- SVG CURVE -->
<svg class="header-curve" viewBox="0 0 500 80" preserveAspectRatio="none">
<path d="M0,40 C150,80 350,0 500,40 L500,80 L0,80 Z"></path>
</svg>

</div>

<!-- NEXT PRAYER -->
<div class="next-card">
<div class="next-title">Next Prayer</div>
<div class="next-time">
<span id="nextPrayer">--</span>
</div>
<div class="progress">
<div id="progressBar"></div>
</div>
<div class="countdown" id="countdown">
Loading...
</div>

</div>

<!-- PRAYER TIMES -->
<div class="prayer-list">

<div class="row" id="row-fajr">
<span>🌅 Fajr</span>
<b id="fajr"></b>
</div>

<div class="row" id="row-dhuhr">
<span>☀️ Dhuhr</span>
<b id="dhuhr"></b>
</div>

<div class="row" id="row-asr">
<span>🌤 Asr</span>
<b id="asr"></b>
</div>

<div class="row" id="row-maghrib">
<span>🌇 Maghrib</span>
<b id="maghrib"></b>
</div>

<div class="row" id="row-isha">
<span>🌙 Isha</span>
<b id="isha"></b>
</div>

</div>

<span>Home</span>

<div class="icon">🕌</div>

<div class="icon">⚙️</div>
<span>Settings</span>
</a>

</div>
  
<script src="js/prayer.js"></script>

</body>
</html>
