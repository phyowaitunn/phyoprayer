<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#0f172a;
color:white;
}

/* Header */
.header{
background:#111827;
padding:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
}

/* Back button */
.back{
position:absolute;
left:15px;
font-size:18px;
cursor:pointer;
}

/* Surah list */
.container{
padding:15px;
}

.surah{
background:#1f2937;
border-radius:12px;
margin-bottom:10px;
padding:15px;
transition:0.3s;
}

.surah-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.surah-name{
font-size:18px;
}

.plus{
background:#2563eb;
border:none;
color:white;
width:32px;
height:32px;
border-radius:50%;
font-size:18px;
cursor:pointer;
}

/* hidden details */
.details{
display:none;
margin-top:10px;
font-size:14px;
line-height:1.6;
}

audio{
width:100%;
margin-top:8px;
}

/* responsive */
@media (max-width:600px){

.surah-name{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="header">
<div class="back" onclick="history.back()">←</div>
Quran
</div>

<div class="container" id="surahList"></div>

<script>

const surahs = [
{n:1,name:"Al-Fatihah",type:"Meccan",ayah:7,audio:"audio/1.mp3"},
{n:2,name:"Al-Baqarah",type:"Medinan",ayah:286,audio:"audio/2.mp3"},
{n:3,name:"Ali 'Imran",type:"Medinan",ayah:200,audio:"audio/3.mp3"},
{n:4,name:"An-Nisa",type:"Medinan",ayah:176,audio:"audio/4.mp3"},
{n:5,name:"Al-Ma'idah",type:"Medinan",ayah:120,audio:"audio/5.mp3"},
{n:6,name:"Al-An'am",type:"Meccan",ayah:165,audio:"audio/6.mp3"},
{n:7,name:"Al-A'raf",type:"Meccan",ayah:206,audio:"audio/7.mp3"},
{n:8,name:"Al-Anfal",type:"Medinan",ayah:75,audio:"audio/8.mp3"},
{n:9,name:"At-Tawbah",type:"Medinan",ayah:129,audio:"audio/9.mp3"},
{n:10,name:"Yunus",type:"Meccan",ayah:109,audio:"audio/10.mp3"}
]

const list=document.getElementById("surahList")

surahs.forEach((s,i)=>{

const div=document.createElement("div")
div.className="surah"

div.innerHTML=`

<div class="surah-top">
<div class="surah-name">${s.n}. ${s.name}</div>

<button class="plus" onclick="toggle(${i})">+</button>
</div>

<div class="details" id="d${i}">
Type: ${s.type}<br>
Ayah: ${s.ayah}

<audio controls>
<source src="${s.audio}" type="audio/mpeg">
</audio>

</div>
`

list.appendChild(div)

})

function toggle(i){

let d=document.getElementById("d"+i)

if(d.style.display==="block"){
d.style.display="none"
}else{
d.style.display="block"
}

}
