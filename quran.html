<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Al-Quran</title>

<style>

body{
background:linear-gradient(180deg,#4b2f1c,#1c120c);
color:white;
font-family:sans-serif;
margin:0;
}

/* header */

.header{
padding:20px;
text-align:center;
color:#f2d08b;
font-size:22px;
font-weight:bold;
}

/* tabs */

.tabs{
display:flex;
background:#2b1b11;
}

.tab{
flex:1;
text-align:center;
padding:14px;
color:#c9a86a;
font-weight:bold;
border-bottom:3px solid transparent;
}

.tab.active{
border-bottom:3px solid #c9a86a;
}

/* list */

.list{
padding:15px;
}

/* surah row */

.surah{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px;
border-bottom:1px solid rgba(255,255,255,0.05);
cursor:pointer;
}

/* left */

.left{
display:flex;
align-items:center;
}

/* number */

.num{
width:36px;
height:36px;
border:2px solid #c9a86a;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:#c9a86a;
margin-right:12px;
}

/* text */

.name{
font-size:18px;
}

.info{
font-size:12px;
color:#aaa;
}

/* arabic */

.ar{
font-size:22px;
color:#c9a86a;
}

</style>

</head>

<body>

<div class="header">
Al-Quran
</div>

<div class="tabs">

<div class="tab active">Surah</div>

<div class="tab">Juz</div>

</div>

<div id="surahList" class="list"></div>

<script>

const list=document.getElementById("surahList")

fetch("https://api.alquran.cloud/v1/surah")

.then(res=>res.json())

.then(data=>{

data.data.forEach(s=>{

list.innerHTML+=`

<div class="surah" onclick="openSurah(${s.number})">

<div class="left">

<div class="num">${s.number}</div>

<div>

<div class="name">${s.englishName}</div>

<div class="info">${s.englishNameTranslation} • ${s.numberOfAyahs} VERSES</div>

</div>

</div>

<div class="ar">${s.name}</div>

</div>

`

})

})

function openSurah(n){

window.location="surah.html?number="+n

}

</script>

</body>
</html>
