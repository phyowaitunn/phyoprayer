<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<link rel="stylesheet" href="style/settings.css">
</head>

<body>

<div class="settings-container">

<h2 class="settings-title">Settings</h2>

<!-- THEME -->

<div class="setting-item">
<span>🌙 Day / Night Mode</span>
<label class="switch">
<input type="checkbox" id="themeToggle">
<span class="slider"></span>
</label>
</div>

<!-- LANGUAGE -->

<div class="setting-item">
<span>🌐 Language</span>

<select id="language">
<option value="en">English</option>
<option value="ms">Malay</option>
<option value="id">Indonesia</option>
</select>

</div>

<!-- AZAN NOTIFICATION -->

<div class="setting-item">
<span>🔔 Azan Notification</span>

<label class="switch">
<input type="checkbox" id="azanToggle">
<span class="slider"></span>
</label>

</div>

<!-- QIBLA COMPASS -->

<div class="setting-item link">
<a href="qibla.html">🧭 Compass Guide</a>
</div>

<!-- ABOUT -->

<div class="setting-item link">
<a href="#">ℹ️ About the App</a>
</div>

<!-- DEVELOPER -->

<div class="developer">

Developed by  
<b>Phyo Wai Tun</b>

</div>

</div>

<script src="settings.js"></script>

</body>
</html>
