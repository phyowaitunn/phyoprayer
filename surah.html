<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Surah Reader</title>

<style>

body{
background:linear-gradient(180deg,#4b2f1c,#1c120b);
font-family:sans-serif;
color:white;
margin:0;
}

.header{
display:flex;
align-items:center;
gap:10px;
padding:18px;
color:#f2d08b;
}

.back{
background:#3b2416;
border:none;
padding:8px 14px;
border-radius:10px;
color:white;
}

.container{
padding:15px;
}

.ayah{
background:#2a1a11;
padding:16px;
margin-bottom:12px;
border-radius:14px;
}

.ar{
font-size:26px;
direction:rtl;
line-height:2;
margin-bottom:10px;
}

.play{
background:#f2d08b;
border:none;
padding:6px 12px;
border-radius:8px;
}

audio{
width:95%;
margin:15px;
}

</style>

</head>

<body>

<div class="header">

<button class="back" onclick="history.back()">← Back</button>

<h2 id="title">Loading...</h2>

</div>

<div class="container" id="list"></div>

<audio id="player" controls></audio>

<script>

const params = new URLSearchParams(window.location.search);
const surah=params.get("surah");

const title=document.getElementById("title");
const list=document.getElementById("list");
const player=document.getElementById("player");

fetch("https://api.alquran.cloud/v1/surah/"+surah)
.then(res=>res.json())
.then(data=>{

const s=data.data;

title.innerText=s.englishName+" - "+s.name;

s.ayahs.forEach(a=>{

list.innerHTML+=`

<div class="ayah">

<div class="ar">${a.text}</div>

<button class="play" onclick="play(${a.number})">
🔊 Play
</button>

</div>

`;

});

})
.catch(()=>{

title.innerText="Failed to load Surah";

});

function play(n){

player.src="https://cdn.islamic.network/quran/audio/128/ar.alafasy/"+n+".mp3";

player.play();

}

</script>

</body>
</html>
