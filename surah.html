<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quran Reader</title>

<style>

body{
background:linear-gradient(180deg,#4b2f1c,#1c120b);
color:white;
font-family:sans-serif;
margin:0;
}

.header{
display:flex;
align-items:center;
gap:10px;
padding:18px;
color:#f2d08b;
}

.back{
background:#3b2416;
border:none;
padding:8px 14px;
border-radius:10px;
color:white;
}

.container{
padding:15px;
}

.ayah{
background:#2a1a11;
padding:16px;
margin-bottom:12px;
border-radius:14px;
}

.ar{
font-size:26px;
direction:rtl;
line-height:2;
}

audio{
width:95%;
margin:15px;
}

</style>

</head>

<body>

<div class="header">

<button class="back" onclick="history.back()">← Back</button>

<h2 id="title">Loading...</h2>

</div>

<div class="container" id="list"></div>

<audio id="player" controls></audio>

<script>

const params=new URLSearchParams(window.location.search);
const surahNumber=params.get("surah");

fetch("/data/quran.json")
.then(r=>r.json())
.then(quran=>{

const surah=quran[surahNumber-1];

document.getElementById("title").innerText=
surah.transliteration+" - "+surah.name;

surah.verses.forEach(v=>{

document.getElementById("list").innerHTML+=`

<div class="ayah">

<div class="ar">${v.text}</div>

<button onclick="play(${v.id})">🔊 Play</button>

</div>

`;

});

});

function play(id){

document.getElementById("player").src=
"https://cdn.islamic.network/quran/audio/128/ar.alafasy/"+id+".mp3";

document.getElementById("player").play();

}

</script>

</body>
</html>
